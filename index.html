<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Image Gallery</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Interactive Image Gallery</h1>

    <div class="gallery">
        <p> Assignment 1 </p>
        <img src="img11.jpg" alt="Image 1">
        <img src="img12.jpg" alt="Image 2">
        <img src="img13.jpg" alt="Image 3">
        <img src="img14.jpg" alt="Image 4">
        <img src="img15.jpg" alt="Image 5">
        <img src="img16.jpg" alt="Image 6">

    </div>

    <div class="lightbox" id="lightbox">

        <span class="close">&times;</span>

        <img id="lightbox-image" src="" alt="Large Image">

    </div>

    <script src="script.js"></script>

</body>

</html>
